services:
  postgres:
    image: postgres:16
    container_name: retentionops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-retentionops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retentionops}
      POSTGRES_DB: ${POSTGRES_DB:-retentionops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retentionops} -d ${POSTGRES_DB:-retentionops}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: retentionops-mlflow
    working_dir: /app
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI:-sqlite:////app/mlflow.db}
      --default-artifact-root ${MLFLOW_ARTIFACT_ROOT:-file:///app/mlruns}
      --allowed-hosts localhost,127.0.0.1,mlflow,mlflow:5000,0.0.0.0
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: retentionops-api
    working_dir: /app
    command: >
      uvicorn src.serving.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://mlflow:5000
      UPLIFT_MODEL_NAME: ${UPLIFT_MODEL_NAME:-uplift_model}
      UPLIFT_MODEL_ALIAS: ${UPLIFT_MODEL_ALIAS:-champion}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://retentionops:retentionops@postgres:5432/retentionops}
      ENABLE_DECISION_LOGGING: ${ENABLE_DECISION_LOGGING:-true}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  jobs:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: retentionops-jobs
    working_dir: /app
    command: bash
    profiles:
      - jobs
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://mlflow:5000
      UPLIFT_MODEL_NAME: ${UPLIFT_MODEL_NAME:-uplift_model}
      UPLIFT_MODEL_ALIAS: ${UPLIFT_MODEL_ALIAS:-champion}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://retentionops:retentionops@postgres:5432/retentionops}
      ENABLE_DECISION_LOGGING: ${ENABLE_DECISION_LOGGING:-true}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: retentionops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: retentionops-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data: