services:
  postgres:
    image: postgres:16
    container_name: retentionops-postgres
    environment:
      POSTGRES_USER: retentionops
      POSTGRES_PASSWORD: retentionops
      POSTGRES_DB: retentionops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retentionops -d retentionops"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: retentionops-mlflow
    working_dir: /app
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////app/mlflow.db
      --default-artifact-root file:///app/mlruns
      --allowed-hosts localhost,127.0.0.1,mlflow,mlflow:5000,0.0.0.0
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: retentionops-api
    working_dir: /app
    command: >
      uvicorn src.serving.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://mlflow:5000
      UPLIFT_MODEL_NAME: uplift_model
      UPLIFT_MODEL_ALIAS: champion
      DATABASE_URL: postgresql+psycopg2://retentionops:retentionops@postgres:5432/retentionops
      ENABLE_DECISION_LOGGING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  jobs:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: retentionops-jobs
    working_dir: /app
    command: bash
    profiles:
      - jobs
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://mlflow:5000
      UPLIFT_MODEL_NAME: uplift_model
      UPLIFT_MODEL_ALIAS: champion
      DATABASE_URL: postgresql+psycopg2://retentionops:retentionops@postgres:5432/retentionops
      ENABLE_DECISION_LOGGING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

volumes:
  postgres_data: